<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Viewer</title>
  <script src="/vendor/marked-12.0.0.min.js"></script>
  <style>
    :root {
      --bg-deep: #0c1117;
      --bg-base: #111820;
      --bg-surface: #161e28;
      --text-primary: #c9d1d9;
      --text-bright: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --border: rgba(255,255,255,0.08);
      --danger: #f04848;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-sans);
      height: 100%;
      min-height: 100vh;
    }
    #viewer-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-bright);
      font-weight: 600;
    }
    #viewer-body {
      padding: 16px;
    }
    /* Code with line numbers */
    .fb-code {
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
    }
    .fb-code-line {
      display: flex;
    }
    .fb-code-linenum {
      min-width: 48px;
      padding: 0 10px;
      color: var(--text-muted);
      text-align: right;
      user-select: none;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }
    .fb-code-text {
      padding: 0 14px;
      white-space: pre;
      color: var(--text-primary);
    }
    /* Markdown */
    .fb-markdown {
      max-width: 800px;
      line-height: 1.7;
      color: var(--text-primary);
    }
    .fb-markdown h1, .fb-markdown h2, .fb-markdown h3,
    .fb-markdown h4, .fb-markdown h5, .fb-markdown h6 {
      color: var(--text-bright);
      margin: 1.4em 0 0.5em;
      line-height: 1.3;
    }
    .fb-markdown h1 { font-size: 1.8em; }
    .fb-markdown h2 { font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .fb-markdown h3 { font-size: 1.15em; }
    .fb-markdown p { margin: 0.6em 0; }
    .fb-markdown ul, .fb-markdown ol { margin: 0.6em 0 0.6em 1.6em; }
    .fb-markdown li { margin: 0.2em 0; }
    .fb-markdown code {
      font-family: var(--font-mono);
      font-size: 0.88em;
      background: rgba(255,255,255,0.06);
      padding: 2px 5px;
      border-radius: 3px;
    }
    .fb-markdown pre {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 0.8em 0;
    }
    .fb-markdown pre code { background: none; padding: 0; }
    .fb-markdown a { color: var(--accent); text-decoration: none; }
    .fb-markdown a:hover { text-decoration: underline; }
    .fb-markdown blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 0.8em 0;
    }
    .fb-markdown table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
    .fb-markdown th, .fb-markdown td {
      border: 1px solid var(--border);
      padding: 6px 12px;
    }
    .fb-markdown th { background: rgba(255,255,255,0.04); color: var(--text-bright); }
    .fb-markdown hr { border: none; border-top: 1px solid var(--border); margin: 1.2em 0; }
    /* Image */
    .fb-image-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }
    .fb-image-preview img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }
    /* Error / loading */
    #viewer-error {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      font-size: 14px;
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div id="viewer-header">
    <span id="viewer-filename">Loading…</span>
  </div>
  <div id="viewer-body">
    <div id="viewer-error" style="display:none;"></div>
    <div id="viewer-content"></div>
  </div>
  <script type="module" src="/js/viewer.js"></script>
</body>
</html>
